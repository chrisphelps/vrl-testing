tests:

  # ---------------------------------------------------------------------------
  # cloudwatch_decode
  #
  # parse_aws_cloudwatch_log_subscription_message does plain serde JSON parsing.
  # The aws_kinesis_firehose source handles GZIP decompression before setting
  # .message, so unit tests can inject plain JSON directly.
  # The JSON must use camelCase keys (serde renames to snake_case on output).
  # ---------------------------------------------------------------------------

  - name: "cloudwatch_decode: parses a valid CloudWatch Logs subscription message"
    inputs:
      - insert_at: cloudwatch_decode
        type: log
        log_fields:
          message: '{"messageType":"DATA_MESSAGE","owner":"123456789012","logGroup":"/aws/lambda/my-fn","logStream":"2024/01/01/[$$LATEST]abc123","subscriptionFilters":["MyFilter"],"logEvents":[{"id":"37538531142362763","timestamp":1698876543000,"message":"INFO hello world"}]}'
    outputs:
      - extract_from: cloudwatch_decode
        conditions:
          - type: vrl
            source: |
              assert!(.log_group    == "/aws/lambda/my-fn")
              assert!(.log_stream   == "2024/01/01/[$$LATEST]abc123")
              assert!(.message_type == "DATA_MESSAGE")
              assert!(is_array(.log_events))

  - name: "cloudwatch_decode: aborts on an invalid (non-JSON) message"
    inputs:
      - insert_at: cloudwatch_decode
        type: log
        log_fields:
          message: "this is not a cloudwatch message"
    no_outputs_from:
      - cloudwatch_decode

  # ---------------------------------------------------------------------------
  # add_fields
  # Inputs are shaped like cloudwatch_decode output:
  # parse_aws_cloudwatch_log_subscription_message produces snake_case field
  # names — log_group, log_stream, log_events, message_type, subscription_filters.
  # ---------------------------------------------------------------------------

  - name: "add_fields: injects all fixed enrichment fields"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(.environment == "production")
              assert!(.service     == "my-service")
              assert!(.team        == "platform")
              assert!(.datacenter  == "us-east-1")

  - name: "add_fields: preserves log_group and log_stream from cloudwatch_decode"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(.log_group  == "/aws/lambda/my-fn")
              assert!(.log_stream == "2024/01/01/[$$LATEST]abc123")

  - name: "add_fields: removes envelope fields, keeps log_group and log_stream"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
          message_type: "DATA_MESSAGE"
          owner: "123456789012"
          subscription_filters: '["MyFilter"]'
          log_events: '[{"id":"abc","timestamp":1698876543000,"message":"INFO"}]'
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(!exists(.message_type))
              assert!(!exists(.owner))
              assert!(!exists(.subscription_filters))
              assert!(!exists(.log_events))
              assert!(exists(.log_group))
              assert!(exists(.log_stream))

  - name: "add_fields: merges JSON message fields into the event"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
          message: '{"level":"info","request_id":"abc-123","latency_ms":42}'
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(.level      == "info")
              assert!(.request_id == "abc-123")
              assert!(.latency_ms == 42)

  - name: "add_fields: handles a plain-text (non-JSON) message without error"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
          message: "plain text log line — not JSON"
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(.message     == "plain text log line — not JSON")
              assert!(.environment == "production")

  - name: "add_fields: adds a timestamp when the event has none"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(is_timestamp(.timestamp))

  - name: "add_fields: preserves an existing timestamp"
    inputs:
      - insert_at: add_fields
        type: log
        log_fields:
          log_group: "/aws/lambda/my-fn"
          log_stream: "2024/01/01/[$$LATEST]abc123"
          timestamp: "2024-01-15T10:30:00Z"
    outputs:
      - extract_from: add_fields
        conditions:
          - type: vrl
            source: |
              assert!(.timestamp == t'2024-01-15T10:30:00Z')
